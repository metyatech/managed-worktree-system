name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a trusted-publishing-capable release
        # Node.js 22 ships with npm 10.x, but npm trusted publishing
        # (OIDC with --provenance) requires npm >=11.5.1. Without this
        # upgrade, the Publish step fails with an opaque `404 Not
        # Found - PUT /<package>` because the registry rejects the
        # OIDC exchange. Pin to the latest npm line so the workflow
        # stays compatible as OIDC requirements evolve.
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Publish
        run: npm publish --access public --provenance
