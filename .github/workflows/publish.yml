name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node.js 24 ships npm >=11.x, which is required for OIDC
          # trusted publishing (the registry rejects older npm with an
          # opaque `404 Not Found - PUT /<package>`). An earlier
          # attempt at `npm install --global npm@latest` on Node 22
          # failed with `Cannot find module 'promise-retry'` because
          # the cached npm 10 tree is incompatible with npm 11's new
          # dependency layout. Staying on the Node release line that
          # ships the required npm avoids the in-runner upgrade.
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Publish
        run: npm publish --access public --provenance
