name: Bug report
description: Report a reproducible defect in mwt behavior or packaging.
title: '[Bug]: '
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: mwt version
      description: Output of `mwt --version`
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Node.js version, and Git version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Exact command sequence that reproduces the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: topology
    attributes:
      label: Repository topology
      description: Relevant sibling paths, remotes, and bootstrap files
